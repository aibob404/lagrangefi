name: Deploy to Test

on:
  workflow_dispatch:

env:
  OWNER: aibob404

jobs:
  deploy:
    runs-on: [self-hosted, k3s]
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Patch image tags
        run: |
          TAG="sha-${{ steps.sha.outputs.short }}"
          sed -i "s/newTag: sha-[a-f0-9]*/newTag: $TAG/g" k8s/overlays/test/kustomization.yaml
          echo "Deploying branch=${{ github.ref_name }} tag=$TAG"
          grep newTag k8s/overlays/test/kustomization.yaml

      - name: Apply to cluster and wait for rollout
        run: |
          echo "==> Applying manifests (branch=${{ github.ref_name }} sha=${{ steps.sha.outputs.short }})"
          kubectl kustomize k8s/overlays/test | kubectl apply -f - -n test

          echo "==> Waiting for rollouts"
          for dep in chain api web; do
            kubectl rollout status deployment/$dep -n test --timeout=120s \
              && echo "$dep: OK" \
              || echo "$dep: rollout timed out (check pod logs)"
          done

          echo "==> Pods"
          kubectl get pods -n test
